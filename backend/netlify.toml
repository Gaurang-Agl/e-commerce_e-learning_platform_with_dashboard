[build]
  # No build step needed — just install dependencies
  command = "npm install"
  # Functions directory
  functions = "netlify/functions"

[functions]
  # Include data files with the function bundle
  included_files = ["data/**"]
  # Use Node.js 18
  node_bundler = "esbuild"

# Redirect ALL /api/* requests to the serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

# Health check shortcut
[[redirects]]
  from = "/"
  to = "/.netlify/functions/api/api/health"
  status = 200
