[build]
  command = "npm install && npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API requests go to the proxy wrapper
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/proxy/:splat"
  status = 200
  force = true

# Fallback for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
