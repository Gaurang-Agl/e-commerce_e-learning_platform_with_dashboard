[build]
  # Navigate back to root, install backend if needed, and build dashboard
  command = "npm install --prefix ../backend && npm install && npm run build"
  publish = "build"
  functions = "../backend/netlify/functions"

[build.environment]
  REACT_APP_API_URL = "/api"

[functions]
  included_files = ["../backend/data/**"]
  node_bundler = "esbuild"

# Proxy API requests to the unified backend mapping
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
